<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">G-Structure selected for CodeLaunch LATAM 2026</title>
  <desc id="desc">Premium announcement image for G-Structure's selection into CodeLaunch LATAM 2026, showing the path from Ecuador to Guadalajara and Dallas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031d36"/>
      <stop offset="0.55" stop-color="#05325a"/>
      <stop offset="1" stop-color="#021326"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38f4ee"/>
      <stop offset="1" stop-color="#0fb8c8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#001225" flood-opacity="0.36"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#f8f8f4" stroke-width="1">
    <path d="M0 130h1600M0 260h1600M0 390h1600M0 520h1600M0 650h1600M0 780h1600"/>
    <path d="M120 0v900M260 0v900M400 0v900M540 0v900M680 0v900M820 0v900M960 0v900M1100 0v900M1240 0v900M1380 0v900"/>
  </g>
  <g opacity="0.2" fill="none" stroke="#38f4ee" stroke-width="3">
    <path d="M1060 150h220v220"/>
    <path d="M1280 150 1025 405"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="92" y="92" width="1416" height="716" rx="28" fill="#f8f8f4"/>
    <rect x="112" y="112" width="1376" height="676" rx="20" fill="#052b4d"/>
    <rect x="112" y="112" width="1376" height="676" rx="20" fill="url(#bg)" opacity="0.96"/>
  </g>
  <g transform="translate(180 170)">
    <rect width="118" height="118" rx="28" fill="#f8f8f4" opacity="0.96"/>
    <path d="M37 35h45L61 56h28v27L39 104l12-34H26V46c0-6 5-11 11-11Z" fill="url(#cyan)"/>
    <path d="M31 33h37L49 53h24v22H43v24H25V39c0-3 3-6 6-6Z" fill="#05325a" opacity="0.92"/>
  </g>
