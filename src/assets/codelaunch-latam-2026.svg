  <text x="180" y="425" fill="#f8f8f4" font-family="Montserrat, Arial, sans-serif" font-size="68" font-weight="800">Selected for</text>
  <text x="180" y="505" fill="#29d7dc" font-family="Montserrat, Arial, sans-serif" font-size="76" font-weight="900">CodeLaunch LATAM 2026</text>
  <text x="180" y="570" fill="#f8f8f4" opacity="0.86" font-family="Montserrat, Arial, sans-serif" font-size="31" font-weight="500">Building G-Frame from Ecuador toward Guadalajara and Dallas.</text>
  <g transform="translate(180 665)" font-family="Montserrat, Arial, sans-serif">
