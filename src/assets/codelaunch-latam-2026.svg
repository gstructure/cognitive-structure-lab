    <text x="0" y="38" fill="#f8f8f4" opacity="0.72" font-size="22">LATAM Competition · Oct 14, 2026</text>
    <text x="510" y="0" fill="#f8f8f4" font-size="24" font-weight="800">Dallas, Texas</text>
    <text x="510" y="38" fill="#f8f8f4" opacity="0.72" font-size="22">World Championship · Nov 12, 2026</text>
  </g>
  <g transform="translate(1005 442)">
    <path d="M0 130 C105 0 240 0 360 90" fill="none" stroke="#29d7dc" stroke-width="8" stroke-linecap="round"/>
